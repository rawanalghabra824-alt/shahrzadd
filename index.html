    <style>
        body {
            font-family: "Tahoma", sans-serif;
            background: #000;

            max-width: 450px;
            margin: auto;
            background: #0a0a0a;

            border-radius: 12px;

            color: #d4af37;
        }

        p {
            font-size: 16px;
            margin-bottom: 25px;
            color: #ccc;
        }

        .btn {
            display: block;
            background: #d4af37;
            color: #000;
            padding: 14px;
            margin: 12px 0;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #b8922c;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
